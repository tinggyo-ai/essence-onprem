<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'none'; connect-src 'none'; frame-src 'none';">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #12111a;
    color: #e0e0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 36px;
    user-select: none;
}
.logo  { font-size: 26px; font-weight: 700; color: #34d399; margin-bottom: 6px; letter-spacing: 1px; }
.sub   { font-size: 12px; color: #666; margin-bottom: 30px; }
.label { font-size: 12px; color: #aaa; margin-bottom: 8px; align-self: flex-start; width: 100%; }
input {
    width: 100%;
    padding: 12px 16px;
    background: #1e1c2e;
    border: 1.5px solid #3d3860;
    border-radius: 8px;
    color: #fff;
    font-size: 17px;
    letter-spacing: 3px;
    text-align: center;
    outline: none;
    font-family: 'Consolas', 'Courier New', monospace;
    margin-bottom: 14px;
    transition: border-color .2s;
}
input:focus { border-color: #10b981; }
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #059669, #34d399);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Malgun Gothic', sans-serif;
    transition: opacity .15s;
}
button:hover  { opacity: .85; }
button:active { opacity: .7; }
.msg { margin-top: 12px; font-size: 12px; text-align: center; min-height: 18px; }
.err { color: #f87171; }
.ok  { color: #4ade80; }
</style>
</head>
<body>
<div class="logo">🔒 Essence On</div>
<div class="sub">AI 업무 어시스턴트 (온프레미스) — 라이센스 활성화</div>
<div class="label">라이센스 키</div>
<input id="key" type="text" placeholder="EON-0001-XXXX-XXXX" maxlength="110" spellcheck="false" autocomplete="off">
<button onclick="activate()">활성화</button>
<div class="msg" id="msg"></div>

<script>
const input = document.getElementById('key');
const msg   = document.getElementById('msg');

input.addEventListener('input', () => {
    let raw = input.value.replace(/\s/g, '');
    if (/^eon/i.test(raw)) raw = 'EON' + raw.slice(3);
    input.value = raw;
});

input.addEventListener('keydown', e => { if (e.key === 'Enter') activate(); });

function activate() {
    const key = input.value.trim();
    msg.className = 'msg';
    msg.textContent = '';
    if (!key) { msg.className = 'msg err'; msg.textContent = '라이센스 키를 입력해 주세요.'; return; }
    window.licenseApi.validate(key).then(r => {
        if (r.valid) {
            msg.className = 'msg ok';
            msg.textContent = '✓ 활성화 완료! Essence On을 시작합니다...';
            input.disabled = true;
            setTimeout(() => window.licenseApi.activate(), 1200);
        } else {
            msg.className = 'msg err';
            msg.textContent = '올바르지 않은 라이센스 키입니다.';
            input.select();
        }
    });
}
</script>
</body>
</html>
